body:
  text: 不載譯人名附東晉録佛涅槃後迦葉阿難於摩竭國僧伽尸城北撰集三藏及雜藏傳先禮佛已禮法衆僧各受集法此諸法典除去五蓋一心聽受説所聚法如阿難説當共信樂是阿難智與佛同等聽集此法如佛涅槃阿難付法愍念衆生護持諸法如視世尊無上導士視阿難等福田無過設非阿難釋種涅槃正法滅盡并及三藏佛雨諸法哀念天人承以完器阿難受持寄付殷勤阿難之法此人乃復終不漏脫所聚法名分別等法如師子吼阿難所説一一於前比丘各好阿難獨立佛自稱譽若過世智若復俗智一切皆知阿難如海汝等為此信向阿難聽所集法悉斷衆苦世明涅槃地為震動山海涌沸天人哭泣世尊出晚涅槃何早人天孤遺諸道荒塞神通徹視神足羅漢皆詣拘夷供養世尊八萬四千過於無漏天人所敬福田無上閻浮利地羅漢悉來世尊涅槃聚會於中別有不還得頻來果溝港進學此輩一倍凡行比丘無數百千舉手哭行世尊那去我等盲聾三毒未除沒於五道誰當拔我比丘尼千數三十五中有神通有漏無漏帝釋梵天及無數天文陀華伎速持來到四天大王各有將從栴檀珠瓔速齎來詣及諸欲天有色無色九十八億咸詣拘夷無畏釋王八萬牙象名馬八萬盡詣拘夷舍衛月王強勇聰明名象七萬皆到拘夷阿闍世王勇猛信佛象七萬半悲泣來詣槃闍梨王名明端政象馬六萬悉詣拘夷名愍王暖鬱光親厚衆各五萬皆來集會西香衆國諸王嚴仗四色軍服數百千衆速疾來至欲見佛尸龍王泣啼追尋諸王維耶離衆象馬車乘如諸天比來詣拘夷凡衆無數并及清信覩佛盡今當覲涅槃世界衆生三十六億皆詣拘夷齎所喪具方百由延拘夷處中天人滿中地無空缺諸天散華供養佛尸鼓天伎樂雨諸花香諸王官屬來詣佛尸皆禮佛足圍繞而立諸王號泣舉手悲號不復見佛為衆説法阿闍世哭來嗚佛足我五逆人持我付誰諸王繞尸散寶滿上並作衆樂香泥塗床舉尸鐵棺灌滿麻油地為震動諸王號哭諸天墮淚渧現於地天王雨淚普皆哭泣天栴檀薪如意雜香積之于地諸王四輩大迦葉等僧衆坐上衆生所供此大福田迦葉衆首丘尼賢者天帝人王各共然尸登燒身時天人號哭嗚呼痛哉我等如何七日供養諸天盡受分為八分著罌第九各還本所王及凡民諸天還上八部神歸八分餘者天龍神得拘夷力人得分立塔八分八塔第九罌塔炭塔第十閻浮所起迦葉僧首行出拘夷詣摩竭國聚會衆僧迦葉語僧比丘莫行當共集會勿令法壞於虛空中迦葉鳴揵欲使法久勝於諸魔迦葉語衆及天與人今當集法令衆生安佛雖涅槃四諦故存八道猶在可獲涅槃先佛長壽人民有福遺法日近不久便盡今人短命佛出第七涅槃之後法那久存不還頻來見道未成今集真僧此不得入天眼神足六通無我一切羅漢我今集之衆聞教聲即各來集八十千衆皆是無漏迦葉問曰弟阿那律遍覩羅漢誰不來者那律便觀大千世界見忉利天有憍桓鉢律白迦葉憍桓忉利羅漢無漏今不來會迦葉命召而亦不來世尊涅槃世空何求迦葉心念比丘能有撰佛所説經法者不遍看不見能集十二部經法義佛所説者唯有阿難是須陀洹當為設宜使成無漏上座方便觀阿難心知有慈愍得道未久迦葉語難不得入衆汝不應入今當出去阿難白曰何耶上座我於三尊有何過失迦葉答曰弟欲知耶汝於佛衆有大過失坐汝佛法減於千歲由汝勸佛度於母人細微之戒佛欲分別汝何不問細微戒耶爾時何念輕慢於戒佛已涅槃今當問誰蹈佛大衣佛渴索水汝竟不與非是過耶此比過多是汝所作非口所陳是故當出阿難長歎悲惋墮淚佛方便終當何恃怙於此便去坐一樹下感結漏盡佛法由興無數億天圍繞阿難來詣大會師子無畏迦葉遙見便謂衆僧皆當速起阿難今至八萬餘衆皆是無垢迦葉上首叉手立迎迦葉舉手善來阿難便上高座修理衆僧真大阿難為衆人眼侍佛已竟瞿曇福成汝觀此僧并觀天衆世間久病有三苦患世間無主道御涅槃快共慈心為衆説法阿難默然迦葉便請上座欣笑作師子吼迦葉心念相望能説阿難今日濟度天人迦葉舉聲大命衆生欲度世者皆來詣此如佛所説種種諸法除衆生苦阿難當説一切知法如散雜華阿難當撰分別三藏如來説法隨衆所欲高座阿難復當敷演十方當聞天龍鬼神四部弟子聞命即至如人熱渴思想飲水奔走趣河當於中飲天龍鬼神四輩弟子來趣阿難於中聞法餘無數衆進學見道頻來不還尋聲後到阿那含道二萬一千斯陀含衆四萬二千須陀洹僧八萬四千此等後到亦欲聽法諸王皆集群臣兵衆阿難儀容衆覩咸歡大衆次坐方十二延阿難在中如月滿明帝釋在右梵天在左侍於阿難如佛在時釋説偈讚天子欣悅覩大會故阿難無畏如轉法輪圍繞佛時瞻阿難顏儀容巍巍梵天亦爾請於如來世尊説法阿難如是魔聞名聲亦來到此并將妻子及臣兵衆波旬覩見若干種衆阿難在中如日光明阿難髻出儀似山頂項有日光照於衆會難陀髻出迦葉項光那律徹視觀於大千諸王在會并及群臣衆人千億皆在此中見會甚樂阿難勇猛波旬愁毒心懷戰栗波旬心念一佛滅度更有三出佛力勢大瞿曇涅槃謂呼得脫此三所得其處甚大見佛滅度心甚喜悅瞿曇法衰無怨仇對當設方宜滅此殘法四部弟子及諸國王魔便出教敕師子將速合四兵盡滅此法即起化兵四種將主圍繞大會出可畏聲收捕道人清信男女誅殺諸王壞裂道場衆會驚愕四輩心念此何從出未成懷疑諸王聞聲皆懷驚怖見魔兵衆各自嚴仗阿難心惟誰來相嬈覩此兵衆乃知魔為阿難便笑敕王頓駕此亂衆者我自降之難以慧力葉以進力申手執魔三尸繫咽第一人尸第二狗尸第三蛇尸膖爛難近魔便首情迦葉見收羅漢應當困於人耶迦葉我前極撓嬈佛世尊未曾見困如今答佛哀愍被大慈鎧終不加害於諸群生我等集法欲令久興汝何為來撓攪我衆魔即叉手啓阿難曰且俱放我不復嬈人阿難使誓迦葉亦爾若後亂衆尸還枷頸三尸化去波旬得免魔便愁怖別立一面諸天稱善佛法得勝遺法久存常當勝魔迦葉敕衆皆當靖定阿難今説如佛所演諸王普起叉手待之諸天悉悅賢者視顏迦葉語難説經時到發此寶箱顯説上法何説增一何説增十何説本起何説諸界阿難長笑師子振欠四顧衆坐説聞如是説一時已地為震動一億天人逮得法眼舍衛增一名彼增十釋中本起魔竭諸界餘經亦爾處處演説阿難以經為大衆説盡集諸經以為一藏律為二藏大法三藏經録阿含戒律大法三分正等以為三藏已説大本録諸異法合集衆雜復為一藏別經四分名作阿含增一中含長雜四含毗尼隨法犯次可生中者久童苦行在後大法諸分作所生名分別第一然後各異增一中含長雜四含迦葉問難此義何謂難答一一比丘念佛以是調意故名增一此後二法思惟善心兩法便生止意分別三處三知宿命漏盡四處四諦五處五根六處六大七處七覺八處八懅九處九止十處十力十一處經名放牛兒慈經斷後增一經終從此義中當一一解此經若干故名增一猶如畫師分部色像是一增一種種撰合如藥無限隨病和合名某藥丸故名增一一一縷綖經緯成布以一一説成於增一如合諸物名空集音種種諸經故名增一猶如草木埿土起牆圍覆於空爾乃成舍如是施戒生天涅槃以義圍繞故名增一如一種泥成數種器是一增一種種義合從此當知種種義説此經盡出當持增一亦不大長亦不至短結義得偶名中阿含字亦不麁亦不極細言義正等是故名中除去上下説於中法棄於彼我故名中含小凶大凶癡疑盡壞以觀正諦是故名中於中長説并及先世劫世流轉是故曰長計於諸止天上快樂聞者歡喜故名曰長七世過佛及攬大乘佛之涅槃是故曰長諸寶計數多有轉輪諸王喜聞故名曰長此法當據學之喜忘欲斷諸結是故曰雜此法等含義味共俱聞之斷疑故名等含是修行地禪智所趣等見諸法是名等含盡此經中撮行兩端聞者多疑故名等含部外雜經諸天讚偈皆入其中故名等含附近法者得好淨意斷諸諍訟故名戒律分別中戒得淨精進聞者皆調是名戒律比丘行是得益於中破碎衆結故名戒律忍諸結垢比丘學是除諸惡行是名戒律觀視諸法從法得益墮甘露地故名毗尼迦栴造竟持用呈佛佛言上法當名上法於中破癡益於世間此衆經明故名大法總持外道斷於貢高衆法牙旗是名大法譬如明燈照於衆物以見諸形故名大法此衆經義如芒甘露是諸法味此大法義諸經戒律勤思惟持勿令放捨繫縛三藏分別字義比丘諸天千萬稱善迦葉復問云何四藏阿難可説為衆生故阿難答曰此説各異隨衆意行是名雜藏佛説宿緣羅漢亦説天梵外道故名雜藏中多偈頌問十二緣此各異入是名雜藏三阿僧祇菩薩生中所生作緣故名三藏中多宿緣多出所生與阿含異是名雜藏雜藏之法讚菩薩生此中諸義多於三藏都合諸法結在一處何等比丘能盡持者當來世時比丘多愚此輩不能盡持三藏後當作師從經出頌由此益增是故不合處處有喜四阿含者或喜毗尼又喜大法或喜外頌或喜雜藏故不一名盡説諸法結四阿含集録諸數并律大法聚為三藏聞是法已天神及人三千比丘逮得漏盡不還八千頻來十千無數天人得見道迹此法久住為天人故諸王常勝盡受百秋一切天人諸王比丘皆共稱善如阿難説集法已訖天人各還四輩弟子皆歸本所佛涅槃後迦葉阿難等於摩竭國僧伽尸城北造集三藏正經及雜藏經常所云四篋者合雜言也凡二百首盧上增一阿含從一至十為十一處經者撰諸十一事經以放牛兒十一事經為始以行慈十一事經為終因其所引便出其經以事相連故合為一卷此放牛經者佛説放牛十一事以況比丘道具十一行成道樹根栽枝葉茂盛多所覆蔭因放牛兒於坐發念佛知其意故説十一事以所行者放牛者即解便逮羅漢
